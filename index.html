<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Sofía cumple 15 en París</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Archivo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#16284A;--navy-deep:#0E1B33;--cream:#FAF6ED;--gold:#E0B05C;--ink:#1C1E24;--muted:#8B93A6;--radius:14px;--accent:#4F8FC4;--ff:"Fraunces",serif;--fb:"Archivo",sans-serif;--fm:"IBM Plex Mono",monospace;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--navy-deep);}
body{color:var(--cream);font-family:var(--fb);-webkit-font-smoothing:antialiased;padding-bottom:2rem;max-width:560px;margin:0 auto;}
.top{padding:1.2rem 1.1rem .8rem;background:linear-gradient(180deg,var(--navy) 0%,var(--navy-deep) 100%);}
.eyebrow{font-family:var(--fm);font-size:.62rem;letter-spacing:.16em;color:var(--gold);text-transform:uppercase;}
h1{font-family:var(--ff);font-weight:600;font-size:1.65rem;line-height:1.15;margin-top:.3rem;}
h1 span{color:var(--gold);font-style:italic;font-weight:500;}
.tabs{display:flex;gap:.4rem;padding:.65rem .9rem;overflow-x:auto;background:var(--navy);position:sticky;top:0;z-index:30;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:0 0 auto;display:flex;align-items:center;gap:.35rem;padding:.45rem .75rem;border-radius:999px;border:1.5px solid var(--tab-color);background:transparent;color:var(--cream);font-family:var(--fb);font-weight:600;font-size:.78rem;cursor:pointer;}
.tab .num{width:1.2rem;height:1.2rem;border-radius:50%;background:var(--tab-color);color:var(--navy-deep);display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:.68rem;font-weight:700;}
.tab.active{background:var(--tab-color);color:var(--navy-deep);}
.tab.active .num{background:var(--navy-deep);color:var(--tab-color);}
.head{padding:.8rem 1.1rem 0;}
.head h2{font-family:var(--ff);font-weight:600;font-size:1.2rem;}
.head p{font-size:.78rem;color:var(--muted);margin-top:.12rem;}
.banner{margin:.65rem .9rem 0;padding:.6rem .85rem;background:var(--cream);color:var(--ink);border-radius:10px;border-left:4px solid var(--gold);font-size:.78rem;font-weight:600;line-height:1.35;}
#map{height:38vh;min-height:210px;margin:.75rem .9rem 0;border-radius:var(--radius);border:2px solid var(--accent);overflow:hidden;}
.schedule{padding:.9rem;display:flex;flex-direction:column;gap:.65rem;}
.stop{background:var(--cream);color:var(--ink);border-radius:var(--radius);padding:.8rem .9rem;display:grid;grid-template-columns:2rem 1fr;gap:.65rem;border-left:5px solid var(--accent);}
.stop .badge{width:2rem;height:2rem;border-radius:50%;background:var(--accent);color:var(--cream);display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-weight:700;font-size:.8rem;flex-shrink:0;}
.stop .time{font-family:var(--fm);font-size:.72rem;color:var(--muted);letter-spacing:.04em;}
.stop h3{font-family:var(--ff);font-weight:600;font-size:.98rem;margin:.08rem 0 .12rem;}
.stop .addr{font-size:.72rem;color:var(--muted);margin-bottom:.28rem;}
.stop p.notes{font-size:.82rem;line-height:1.42;}
.stop .btn-row{display:flex;gap:.65rem;align-items:center;margin-top:.55rem;}
.stop a.go{display:inline-flex;align-items:center;gap:.25rem;font-size:.76rem;font-weight:700;color:var(--navy);text-decoration:none;border-bottom:1.5px solid var(--gold);}
.stop.special{border-left-color:var(--gold);background:linear-gradient(135deg,var(--cream) 0%,#FFF6E0 100%);}
.stop.special .badge{background:var(--gold);color:var(--navy-deep);}
.sparkle{display:inline-block;font-size:.82em;animation:twinkle 1.8s ease-in-out infinite;}
.sparkle:nth-of-type(2){animation-delay:.45s;}
@keyframes twinkle{0%,100%{opacity:.3;transform:scale(.85)}50%{opacity:1;transform:scale(1.15)}}
.lmarker{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--fm);font-weight:700;font-size:.76rem;border:2px solid var(--cream);box-shadow:0 1px 4px rgba(0,0,0,.35);}
.lmarker.home{background:var(--cream);color:var(--navy);border-color:var(--gold);font-size:.95rem;}
.leaflet-popup-content{font-family:var(--fb);font-size:.8rem;line-height:1.4;}
.leaflet-popup-content a{color:var(--navy);font-weight:700;}
footer{padding:1.2rem 1.1rem .4rem;text-align:center;font-family:var(--fm);font-size:.65rem;color:var(--muted);line-height:1.6;}
</style>
</head>
<body>
<header class="top">
  <p class="eyebrow">12&mdash;15 JUL 2026 &middot; BASE: QUAI DE GRENELLE 15&deg;</p>
  <h1>Sofía cumple 15<br><span>en París</span></h1>
</header>
<nav class="tabs" id="tabs"></nav>
<div class="head" id="head"></div>
<div class="banner" id="banner"></div>
<div id="map"></div>
<main class="schedule" id="schedule"></main>
<footer>🧭 "Desde..." abre Google Maps con ruta caminando desde la parada anterior</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js" crossorigin=""></script>
<script>
const HOME={lat:48.851788,lng:2.2856354,name:"41 Quai de Grenelle (depto)"};
const DAYS=[
  {id:1,date:"Dom 12/7",title:"Llegada",subtitle:"París suave y hermoso",color:"#4F8FC4",
   banner:"🗼 Hoy es el ÚNICO día para subir a la Torre Eiffel — reservá la entrada online antes de salir (este año cierra el 13/7).",
   stops:[
    {time:"12:30",title:"Almuerzo — L'Abreuvoir",address:"24 Rue du Dr Finlay, 75015",notes:"8 min caminando del depto. Bistró muy bien valorado, económico y abundante, muy popular entre locales. Abre desde las 8h.",lat:48.8519379,lng:2.2889287},
    {time:"13:45",title:"Fotos — Avenida Buenos Aires",address:"Av. de Buenos-Ayres, 75007",notes:"A 5 min del almuerzo — una avenida parisina con el nombre de la capital argentina. Foto obligada de familia.",lat:48.8553,lng:2.2978},
    {time:"14:15",title:"Paseo — Plaza del Trocadéro",address:"Pl. du Trocadéro, 75016",notes:"10 min caminando cruzando el Sena. El mirador clásico de la Torre Eiffel — las mejores fotos con la Torre de fondo y el panorama completo.",lat:48.8627982,lng:2.2876042},
    {time:"15:15",title:"Paseo — Champ de Mars + Pont d'Iéna",address:"Champ de Mars, 75007",notes:"Cruzando el puente de vuelta al Campo de Marte: jardines, Pont d'Iéna y orilla del Sena caminando tranquilos.",lat:48.859868,lng:2.2920043},
    {time:"16:30",title:"Torre Eiffel",address:"Av. Gustave Eiffel, 75007",notes:"Entrada reservada online (horario 16:30). Ya están en Champ de Mars, es llegar caminando.",lat:48.8583701,lng:2.2944813},
    {time:"18:00",title:"Merienda — Le Suffren",address:"84 Av. de Suffren, 75015",notes:"Brasserie clásico borde sur de Champ de Mars. Buen croque-monsieur después de bajar de la Torre.",lat:48.8511726,lng:2.3005486},
    {time:"19:30",title:"Vuelta al departamento",address:"41 Quai de Grenelle, 75015",notes:"10–12 min caminando por el Quai de Grenelle. Tiempo para descansar y prepararse para el crucero.",lat:48.851788,lng:2.2856354},
    {time:"21:20",title:"Crucero cena — Paris en Scène",address:"Île aux Cygnes, Pont de Bir-Hakeim",notes:"YA RESERVADO 21:30h. Bajar la escalera central del Pont de Bir-Hakeim hacia la isla, muelle 50m a la izquierda. 1h45 con cena de 3 pasos.",lat:48.8552,lng:2.2872}
  ]},
  {id:2,date:"Lun 13/7",title:"Cumple de Sofía",subtitle:"Día histórico + Fuegos artificiales",color:"#E0617A",special:true,
   banner:"🎆 Esta noche: fuegos artificiales excepcionales (23h, movidos del 14 al 13/7). ¡Reservar Le Bistro Parisien YA!",
   stops:[
    {time:"10:00",title:"Jardin du Luxembourg",address:"75006 Paris",notes:"Paseo, fuentes y esculturas — también tiene su propia mini Estatua de la Libertad.",lat:48.8466144,lng:2.3363309},
    {time:"10:45",title:"Desayuno — Mademoiselle Angelina",address:"19 Rue de Vaugirard, 75006",notes:"Junto al Musée du Luxembourg (abre 10:30). Croissant + café crème, y el pain perdu para Sofía.",lat:48.8489085,lng:2.3341799},
    {time:"12:00",title:"Panthéon",address:"Pl. du Panthéon, 75005",notes:"12 min caminando desde Angelina. Cripta + interior — tumbas de Voltaire, Rousseau, Victor Hugo. Abre hasta 18:30.",lat:48.8462218,lng:2.3464138},
    {time:"13:15",title:"Barrio Latino → Notre-Dame",address:"Quartier Latin / Île de la Cité, 75005",notes:"Bajar por Rue Saint-Jacques, calles medievales del Barrio Latino hasta Île de la Cité. Notre-Dame reabrió en 2024: entrada gratuita, reservar timed-entry online.",lat:48.8529682,lng:2.3499021},
    {time:"14:00",title:"Almuerzo — Café de Flore",address:"172 Bd Saint-Germain, 75006",notes:"15 min desde Notre-Dame hacia Saint-Germain. Croque-Monsieur + postre con vela para el cumple de Sofía.",lat:48.8541588,lng:2.3326046},
    {time:"15:30",title:"Pont des Arts → Louvre → Tuileries",address:"75001/75006 Paris",notes:"Candados del puente, pirámide del Louvre, fuente de las Tullerías y tiendas de perfumes cerca de Rue de Rivoli. Vuelta: Concorde → línea 8 hasta La Motte-Picquet-Grenelle.",lat:48.8583424,lng:2.3375084},
    {time:"21:00",title:"Cena — Le Bistro Parisien",address:"Port de la Bourdonnais, 75007",notes:"Restaurante flotante al pie de la Torre Eiffel. A las 23h: FUEGOS ARTIFICIALES — el cierre perfecto para los 15 de Sofía.",lat:48.8602684,lng:2.2934719,special:true},
    {time:"23:45",title:"Bal des Pompiers — Caserne Grenelle",address:"6 Pl. Violet, 75015",notes:"Después de los fuegos, caminando (~15 min) al cuartel: música y baile popular hasta tarde.",lat:48.8443364,lng:2.290282}
  ]},
  {id:3,date:"Mar 14/7",title:"Día de la Bastilla",subtitle:"Montmartre + Ópera",color:"#6FAE7E",
   banner:"🇫🇷 El desfile en Champs-Élysées se ve mejor desde el Pont Alexandre III o los jardines del Grand Palais.",
   stops:[
    {time:"9:30",title:"Desfile — Pont Alexandre III",address:"75008 Paris",notes:"Línea 8 (La Motte-Picquet-Grenelle → Invalides, ~20 min). Vista del desfile + Grand Palais. Chequear alertas de RATP esa mañana.",lat:48.8638995,lng:2.313559},
    {time:"11:00",title:"Rue de Steinkerque + Funicular",address:"Rue de Steinkerque, 75018",notes:"Calle de tiendas y souvenirs al pie de la colina. El funicular sube directamente hasta el Sacré-Cœur (válido con ticket de metro).",lat:48.88437,lng:2.3433155},
    {time:"11:30",title:"Montmartre — Sacré-Cœur + calles históricas",address:"35 Rue du Chevalier de la Barre, 75018",notes:"Rue de l'Abreuvoir, Rue Lepic y Rue des Saules — casas antiguas, escaleras, cafés y artistas. Entrada gratuita desde las 6:30h.",lat:48.8867046,lng:2.3431043},
    {time:"13:00",title:"Place du Tertre",address:"75018 Paris",notes:"La plaza de los pintores, a metros de la Basílica.",lat:48.8863577,lng:2.3408979},
    {time:"13:45",title:"Almuerzo — Le Relais Gascon",address:"13 Rue Joseph de Maistre, 75018",notes:"7 min desde Place du Tertre. Alternativa: Le Consulat, o cualquier crepería al pasar.",lat:48.8861444,lng:2.3336556},
    {time:"15:00",title:"Moulin Rouge",address:"82 Bd de Clichy, 75018",notes:"Parada corta 10–15 min para verlo por fuera. Tiempo libre por Pigalle antes de ir hacia Ópera.",lat:48.8841232,lng:2.3322519},
    {time:"17:00",title:"Palais Garnier",address:"Pl. de l'Opéra, 75009",notes:"La fachada vale la pena aunque no entren. Arquitectura del Segundo Imperio en todo su esplendor.",lat:48.8719697,lng:2.3316014},
    {time:"18:00",title:"Galeries Lafayette",address:"40 Bd Haussmann, 75009",notes:"Al lado de la Ópera. Abre hasta 20:30. Vuelta: línea 8 desde Ópera hasta La Motte-Picquet-Grenelle (~16 min) + 12 min a pie.",lat:48.8736224,lng:2.3321099}
  ]},
  {id:4,date:"Mié 15/7",title:"Partida",subtitle:"Eurostar 16:02 → Londres",color:"#B79AD6",
   banner:"🚄 Tren sale 16:02 desde Gare du Nord. Estar ahí a las 14:30 (90 min antes por control de pasaportes).",
   stops:[
    {time:"9:00",title:"Dejar maletas — LOCK & enjoy! Tour Eiffel",address:"3 Rue Augereau, 75007",notes:"8 min caminando del depto. Abierto 24h, lockers automáticos con QR. Alternativa: Nannybag Gare du Nord (31 Rue de Saint-Quentin).",lat:48.857806,lng:2.3018382},
    {time:"9:30",title:"Arco de Triunfo",address:"Pl. Charles de Gaulle, 75008",notes:"Metro línea 6 (Bir-Hakeim → Charles de Gaulle-Étoile, 4 paradas, ~10 min). Subida al techo recomendada (10h, reservar online): vistas 360° de los 12 bulevares.",lat:48.8737917,lng:2.2950275},
    {time:"10:45",title:"Moda — Champs-Élysées + Av. Montaigne",address:"75008 Paris",notes:"Champs-Élysées (~1,8 km) o Av. Montaigne (Dior, Chanel, Valentino). Galeries Lafayette Champs-Élysées (nº 60) en el camino.",lat:48.8706988,lng:2.3062649},
    {time:"12:00",title:"Pirámide del Louvre + exterior",address:"75001 Paris",notes:"Patio exterior, pirámide, Carrousel du Louvre y Tullerías. Entrar al museo requiere mínimo 3h — no da por el horario del tren.",lat:48.8606111,lng:2.337644},
    {time:"13:45",title:"Hacia Gare du Nord",address:"18 Rue de Dunkerque, 75010",notes:"Línea 1 (Palais Royal → Châtelet) + línea 4 (hasta Gare du Nord) = ~20 min. Llegada ~14:10 con margen para comer algo antes del boarding.",lat:48.8809706,lng:2.3561432}
  ]}
];

let map,layer;
function initMap(){
  map=L.map('map',{attributionControl:true}).setView([HOME.lat,HOME.lng],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OSM'}).addTo(map);
  layer=L.layerGroup().addTo(map);
}
function pin(h){return L.divIcon({html:h,className:'',iconSize:[26,26],iconAnchor:[13,13]});}
function gmaps(fLat,fLng,tLat,tLng){return `https://www.google.com/maps/dir/?api=1&origin=${fLat},${fLng}&destination=${tLat},${tLng}&travelmode=walking`;}

function renderDay(idx){
  const day=DAYS[idx];
  document.documentElement.style.setProperty('--accent',day.color);
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.getElementById('head').innerHTML=`<h2>${day.title}</h2>${day.subtitle?`<p>${day.subtitle}</p>`:''}`;
  document.getElementById('banner').innerHTML=day.banner;
  layer.clearLayers();
  const pts=[[HOME.lat,HOME.lng]];
  L.marker([HOME.lat,HOME.lng],{icon:pin('<div class="lmarker home">🏠</div>')}).addTo(layer).bindPopup(`<b>${HOME.name}</b>`);
  day.stops.forEach((s,i)=>{
    const m=L.marker([s.lat,s.lng],{icon:pin(`<div class="lmarker" style="background:${day.color}">${i+1}</div>`)}).addTo(layer);
    const prev0=i===0?HOME:day.stops[i-1];
    m.bindPopup(`<b>${s.time} · ${s.title.replace(/—/g,'–')}</b><br>${s.address}<br><a href="${gmaps(prev0.lat,prev0.lng,s.lat,s.lng)}" target="_blank">Cómo llegar →</a>`);
    pts.push([s.lat,s.lng]);
  });
  L.polyline(pts,{color:day.color,weight:3,dashArray:'6,8',opacity:.85}).addTo(layer);
  map.fitBounds(L.latLngBounds(pts),{padding:[26,26]});
  const sch=document.getElementById('schedule');
  sch.innerHTML='';
  day.stops.forEach((s,i)=>{
    const prev=i===0?HOME:day.stops[i-1];
    const prevName=i===0?'el departamento':'parada '+i;
    const el=document.createElement('div');
    el.className='stop'+(s.special?' special':'');
    const badge=document.createElement('div');
    badge.className='badge';
    badge.textContent=i+1;
    const col=document.createElement('div');
    col.innerHTML=`
      <div class="time">${s.time}</div>
      <h3>${s.title.replace(/—/g,'&mdash;')}${s.special?' <span class="sparkle">✨</span><span class="sparkle">✨</span>':''}</h3>
      <div class="addr">${s.address}</div>
      <p class="notes">${s.notes}</p>
      <div class="btn-row">
        <a class="go" href="${gmaps(prev.lat,prev.lng,s.lat,s.lng)}" target="_blank">🧭 Desde ${prevName}</a>
      </div>`;
    el.appendChild(badge);
    el.appendChild(col);
    sch.appendChild(el);
  });
}

function buildTabs(){
  const te=document.getElementById('tabs');
  DAYS.forEach((d,i)=>{
    const b=document.createElement('button');
    b.className='tab'+(i===0?' active':'');
    b.style.setProperty('--tab-color',d.color);
    b.innerHTML=`<span class="num">${d.id}</span> ${d.date}${d.special?' ✨':''}`;
    b.addEventListener('click',()=>renderDay(i));
    te.appendChild(b);
  });
}

initMap();
buildTabs();
renderDay(0);
</script>
</body>
</html>
